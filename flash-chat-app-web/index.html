<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="toast"></div>

<!-- Modal -->
<div class="modal-mask" id="modal" onclick="if(event.target===this)App._closeModal()">
  <div class="modal-box">
    <div class="modal-header"><span id="modal-title"></span><span class="modal-close" onclick="App._closeModal()">&times;</span></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Confirm -->
<div class="modal-mask" id="confirm" onclick="if(event.target===this)App._closeConfirm(false)">
  <div class="modal-box" style="width:340px">
    <div class="modal-header" style="border:none;padding-bottom:4px"><span id="confirm-title"></span></div>
    <div class="modal-body" style="text-align:center;padding:4px 20px 16px"><p id="confirm-content" style="font-size:14px;color:#666"></p></div>
    <div class="modal-btns">
      <button onclick="App._closeConfirm(false)">取消</button>
      <button class="danger" onclick="App._closeConfirm(true)">确定</button>
    </div>
  </div>
</div>

<div class="app" id="app">

<!-- ===== Login ===== -->
<div class="login-overlay" id="page-login">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">FC</div>
      <div class="login-title">Flash Chat</div>
      <div class="login-desc">快速、安全的即时通讯</div>
    </div>
    <div class="form-item">
      <label class="form-label">手机号</label>
      <input class="form-input" type="tel" maxlength="11" id="login-phone" placeholder="请输入手机号" autofocus>
    </div>
    <div class="form-row">
      <div class="form-item flex-1">
        <label class="form-label">验证码</label>
        <input class="form-input" type="tel" maxlength="6" id="login-code" placeholder="请输入验证码">
      </div>
      <button class="code-btn disabled" id="code-btn">获取验证码</button>
    </div>
    <button class="login-btn disabled" id="login-btn">登 录</button>
  </div>
</div>

<!-- ===== Main ===== -->
<div class="main-layout" id="page-main" style="display:none">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-user" onclick="App._showProfile()" title="编辑资料">
        <img class="sidebar-avatar" id="my-avatar-sidebar" src="" alt="">
        <div class="sidebar-user-info">
          <span class="sidebar-name" id="my-name-sidebar">用户</span>
          <span class="sidebar-status">在线</span>
        </div>
      </div>
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="chat" title="会话" id="tab-chat-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button class="sidebar-tab" data-tab="friend" title="好友" id="tab-friend-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </button>
        <button class="sidebar-tab" data-tab="moment" title="朋友圈" id="tab-moment-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        </button>
      </div>
      <div class="search-trigger" onclick="App._showSearch()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <span>搜索用户</span>
      </div>
    </div>

    <div class="sidebar-panels">
      <!-- Panel: Conversations -->
      <div class="panel" id="panel-chat">
        <div class="panel-title">会话</div>
        <div class="conv-list" id="conversation-list"></div>
      </div>

      <!-- Panel: Friends -->
      <div class="panel" id="panel-friend" style="display:none">
        <div class="panel-title">通讯录</div>
        <div id="request-section" style="display:none">
          <div class="panel-subtitle">待处理申请 <span class="req-badge" id="request-badge">0</span></div>
          <div id="request-list"></div>
        </div>
        <div class="panel-subtitle">好友列表</div>
        <div class="friend-list" id="friend-list"></div>
      </div>

      <!-- Panel: Moments -->
      <div class="panel" id="panel-moment" style="display:none">
        <div class="panel-title">
          <span>朋友圈</span>
          <button class="panel-action" onclick="App._createMoment()" title="发动态">+</button>
        </div>
        <div class="moment-list" id="moment-list"></div>
      </div>

      <!-- Search overlay -->
      <div class="search-overlay" id="search-area" style="display:none">
        <div class="search-bar">
          <input class="search-input" id="search-keyword" placeholder="搜索手机号或昵称..." autofocus>
          <button class="search-close" onclick="App._hideSearch()">&times;</button>
        </div>
        <div class="search-results" id="search-results"></div>
      </div>
    </div>

    <div class="sidebar-bottom">
      <button class="sidebar-logout" onclick="App._logout()" title="退出登录">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Empty State -->
    <div class="empty-state" id="empty-state">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <div class="empty-text">选择一个会话开始聊天</div>
      <div class="empty-sub">或点击好友 / 搜索查找联系人</div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chat-area" style="display:none">
      <div class="chat-header">
        <div class="chat-header-left">
          <img class="chat-header-avatar" id="detail-avatar" src="" alt="">
          <div class="chat-header-info">
            <span class="chat-header-name" id="detail-name">用户</span>
            <span class="chat-header-type" id="detail-type"></span>
          </div>
        </div>
        <div class="chat-header-actions">
          <button class="chat-header-btn" id="group-manage-btn" style="display:none" onclick="App._showGroupManage()" title="群管理">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </div>
      <div class="msg-list" id="msg-list"></div>
      <div class="input-bar">
        <button class="input-btn" onclick="App._chooseImage()" title="发送图片">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        </button>
        <input class="msg-input" id="msg-input" placeholder="输入消息..." autofocus>
        <button class="send-btn disabled" id="send-btn">发送</button>
      </div>
    </div>

  </main>
</div>

<!-- ===== Group Manage Panel (slide-in) ===== -->
<div class="slide-panel" id="slide-group" style="display:none">
  <div class="slide-header">
    <button class="slide-back" onclick="App._hideGroupManage()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span>群管理</span>
  </div>
  <div class="slide-body" id="group-manage-body"></div>
</div>

<!-- ===== Moment Create Panel (slide-in) ===== -->
<div class="slide-panel right" id="slide-moment-create" style="display:none">
  <div class="slide-header">
    <span>发动态</span>
    <button class="slide-btn" onclick="App._doCreateMoment()">发布</button>
  </div>
  <div class="slide-body">
    <textarea class="moment-input" id="moment-content" placeholder="分享你的生活..." rows="4"></textarea>
    <div id="moment-thumbs"></div>
    <button class="moment-add-img" onclick="App._chooseMomentImages()">+ 添加图片</button>
  </div>
</div>

</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/websocket.js"></script>
<script src="js/app.js"></script>
</body>
</html>
